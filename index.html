<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ateliê dos Olhos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--dark:#0E0E14;--card:#16161F;--card2:#1E1E2A;--border:#2A2A38;--text:#E8E8F0;--muted:#888898;--green:#2ECC71;--red:#E74C3C}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(201,168,76,.08) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 110%,rgba(201,168,76,.05) 0%,transparent 60%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 20px}
.screen{display:none!important}
.screen.active{display:flex!important}
#login{flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:32px}
#dashboard.active{display:block!important}
.brand{text-align:center}
.brand-eyebrow{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.brand-name{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:var(--text)}
.brand-sub{font-size:12px;color:var(--muted);margin-top:6px}
.divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 28px;width:100%}
.card h2{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:6px}
.card p{font-size:13px;color:var(--muted);margin-bottom:24px}
label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
input{width:100%;padding:14px 16px;background:var(--card2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
input:focus{border-color:var(--gold)}
.btn{width:100%;margin-top:20px;padding:16px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--gold),#E8C96A);color:#0E0E14;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{margin-top:12px;padding:10px 14px;background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);border-radius:10px;font-size:12px;color:#E74C3C;display:none}
.err.show{display:block}
#dashboard{padding:20px 0}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.info h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:4px}
.code{display:inline-block;margin-top:4px;padding:4px 12px;border-radius:100px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
.exit-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:8px 14px;font-size:11px;cursor:pointer}
.exit-btn:hover{border-color:var(--gold);color:var(--gold)}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.kpi-card.full{grid-column:1/-1}
.kpi-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.kpi-value{font-family:'Playfair Display',serif;font-size:32px;font-weight:700}
.kpi-value.green{color:var(--green)}
.kpi-value.gold{color:var(--gold)}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px}
.bar{margin-top:12px;background:var(--card2);border-radius:100px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--gold),var(--green));transition:width 1.2s}
.timeline-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin:24px 0 12px}
.timeline{display:flex;flex-direction:column;gap:8px;padding-bottom:40px}
.item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;gap:12px;align-items:center}
.icon{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.icon.won{background:rgba(46,204,113,.15)}
.icon.lost{background:rgba(231,76,60,.12)}
.icon.neg{background:rgba(243,156,18,.12)}
.item-info{flex:1}
.item-name{font-size:13px;font-weight:600}
.item-meta{font-size:11px;color:var(--muted);margin-top:2px}
.item-status{font-size:10px;padding:4px 10px;border-radius:100px;flex-shrink:0}
.item-status.won{background:rgba(46,204,113,.15);color:var(--green)}
.item-status.lost{background:rgba(231,76,60,.1);color:var(--red)}
.item-status.neg{background:rgba(243,156,18,.1);color:#F39C12}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
</style>
</head>
<body>

<div id="login" class="screen active">
  <div class="wrap" style="width:100%">
    <div class="brand">
      <div class="brand-eyebrow">Porto Seguro · BA</div>
      <div class="brand-name">Ateliê dos Olhos</div>
      <div class="brand-sub">Seu Painel de Resultados</div>
    </div>
    <div class="divider"></div>
    <div class="card">
      <h2>Acessar Painel</h2>
      <p>Digite seu código de acesso</p>
      <label>Seu código</label>
      <input type="text" id="cod" placeholder="Digite seu código aqui" autocomplete="off">
      <button class="btn" onclick="login()">Acessar meu painel</button>
      <div class="err" id="err"></div>
    </div>
  </div>
</div>

<div id="dashboard" class="screen">
  <div class="wrap">
    <div class="header">
      <div class="info">
        <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)">Olá,</div>
        <h1 id="name">—</h1>
        <div class="code" id="cupom">—</div>
      </div>
      <button class="exit-btn" onclick="logout()">Sair</button>
    </div>
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Indicações</div>
        <div class="kpi-value gold" id="v-ind">0</div>
        <div class="kpi-sub">clientes</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Vendas</div>
        <div class="kpi-value green" id="v-vend">0</div>
        <div class="kpi-sub">conversões</div>
      </div>
      <div class="kpi-card full">
        <div class="kpi-label">Taxa de conversão</div>
        <div class="kpi-value gold" id="v-conv">0%</div>
        <div class="bar"><div class="bar-fill" id="bar"></div></div>
      </div>
      <div class="kpi-card full">
        <div class="kpi-label">Crédito a receber</div>
        <div class="kpi-value gold" id="v-cred">R$ 0,00</div>
        <div class="kpi-sub">comissões não pagas</div>
      </div>
    </div>
    <div class="timeline-title">Histórico</div>
    <div class="timeline" id="list"></div>
  </div>
</div>

<script>
const SHEET = "1So-Tr9n_wvTTbaxC-mf_CAaJmmO1yi5RLBfysXe6zDY";
const KEY = "AIzaSyCtO6Bw_kNH8g_OlrZgq7aTfTbrEftCujo";

document.getElementById("cod").addEventListener("keypress", e => {
  if (e.key === "Enter") login();
});

async function login() {
  const code = document.getElementById("cod").value.trim().toLowerCase();
  if (!code) { showErr("Digite seu código"); return; }
  try {
    const inf = await findInf(code);
    if (!inf) { showErr("Código não encontrado"); return; }
    await loadDash(inf);
  } catch(e) {
    console.error(e);
    showErr("Erro ao carregar");
  }
}

async function findInf(code) {
  // Aba Influenciadores: linha1=título, linha2=cabeçalho, linha3+=dados
  // A=NOME, B=CUPOM, C=CONTATO, D=SALDO, E=CÓDIGO, F=DESCONTO%, G=COMISSÃO%
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET}/values/${encodeURIComponent('👤 Influenciadores')}?key=${KEY}`;
  const res = await fetch(url);
  if (!res.ok) return null;
  const data = await res.json();
  const rows = data.values || [];

  for (let i = 2; i < rows.length; i++) {
    const row = rows[i];
    // E=índice 4 = CÓDIGO
    if (row[4] && row[4].toString().toLowerCase() === code) {
      return {
        nome: row[0] || "",
        cupom: row[1] || ""
      };
    }
  }
  return null;
}

function logout() {
  document.getElementById("login").classList.add("active");
  document.getElementById("dashboard").classList.remove("active");
  document.getElementById("cod").value = "";
}

async function loadDash(inf) {
  document.getElementById("login").classList.remove("active");
  document.getElementById("dashboard").classList.add("active");
  document.getElementById("name").textContent = inf.nome;
  document.getElementById("cupom").textContent = inf.cupom;

  const vendas = await getVendas(inf.nome);

  // INDICAÇÕES = todas as linhas do influenciador
  const total = vendas.length;

  // VENDAS = só as que status = "Comprou"
  const comprou = vendas.filter(v => v.status === "Comprou").length;

  // TAXA
  const pct = total > 0 ? Math.round(comprou / total * 100) : 0;

  // CRÉDITO = soma comissão onde STATUS = "Comprou" E PAGO = "NÃO"
  const credito = vendas
    .filter(v => v.status === "Comprou" && v.pago && v.pago.toString().toUpperCase() === "NÃO")
    .reduce((s, v) => s + v.comissao, 0);

  document.getElementById("v-ind").textContent = total;
  document.getElementById("v-vend").textContent = comprou;
  document.getElementById("v-conv").textContent = pct + "%";
  document.getElementById("v-cred").textContent = credito.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

  setTimeout(() => {
    document.getElementById("bar").style.width = pct + "%";
  }, 100);

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (vendas.length === 0) {
    list.innerHTML = `<div class="empty">Nenhuma indicação ainda</div>`;
    return;
  }

  [...vendas].reverse().forEach(v => {
    let st;
    if (v.status === "Comprou") st = {l:"Comprou", c:"won", i:"✅"};
    else if (v.status === "Negociando" || v.status === "Negociação" || v.status === "Negoiando") st = {l:"Negociando", c:"neg", i:"🔄"};
    else st = {l:"Não comprou", c:"lost", i:"❌"};

    const pago = v.pago && v.pago.toString().toUpperCase() === "SIM";
    const comprouVenda = v.status === "Comprou";
    const dataMostrar = v.data;
    const pagoBadge = pago && comprouVenda
      ? `<div style="font-size:10px;color:#2ECC71;margin-top:3px">✓ Pago ${v.comissao.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}${v.dataPag ? ' em ' + v.dataPag : ''}</div>`
      : "";

    const el = document.createElement("div");
    el.className = "item";
    el.innerHTML = `
      <div class="icon ${st.c}">${st.i}</div>
      <div class="item-info">
        <div class="item-name">${v.cliente}</div>
        <div class="item-meta">${dataMostrar}</div>
        ${pagoBadge}
      </div>
      <div class="item-status ${st.c}">${st.l}</div>
    `;
    list.appendChild(el);
  });
}

async function getVendas(nome) {
  // Aba Vendas: linha1=título, linha2=cabeçalho, linha3+=dados
  // A=DATA, B=INFLUENCIADOR, C=NOME CLIENTE, D=CONTATO, E=STATUS
  // F=VALOR, G=DESCONTO(R$), H=VALOR FINAL, I=COMISSÃO(R$), J=PAGO, K=DATA PAG
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET}/values/${encodeURIComponent('📋 Vendas')}?key=${KEY}`;
  try {
    const res = await fetch(url);
    if (!res.ok) return [];
    const data = await res.json();
    const rows = data.values || [];
    if (rows.length < 3) return [];

    return rows.slice(2)
      .filter(r => r[1] && r[1].toString().trim() === nome.toString().trim())
      .map(r => ({
        data: r[0] || "",
        cliente: r[2] || "",
        status: r[4] || "",
        comissao: parseFloat((r[8] || "0").toString().replace("R$","").replace(".","").replace(",",".").trim()) || 0,
        pago: r[9] || "NÃO",
        dataPag: r[10] || ""
      }))
      .filter(v => v.cliente);
  } catch(e) {
    console.error(e);
    return [];
  }
}

function showErr(msg) {
  const el = document.getElementById("err");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3000);
}
</script>
</body>
</html>
