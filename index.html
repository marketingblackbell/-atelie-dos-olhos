<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ateliê dos Olhos · Painel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root { --gold: #C9A84C; --dark: #0E0E14; --card: #16161F; --card2: #1E1E2A; --border: #2A2A38; --text: #E8E8F0; --muted: #888898; --green: #2ECC71; --red: #E74C3C; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse 80% 50% at 20% -10%, rgba(201,168,76,0.08) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 110%, rgba(201,168,76,0.05) 0%, transparent 60%); pointer-events:none; z-index:0; }
.wrap { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:0 20px; }
#login { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:32px; }
.brand { text-align:center; }
.brand-eyebrow { font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:8px; }
.brand-name { font-family:'Playfair Display', serif; font-size:32px; font-weight:900; color:var(--text); }
.brand-sub { font-size:12px; color:var(--muted); margin-top:6px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:32px 28px; width:100%; }
.card h2 { font-family:'Playfair Display', serif; font-size:20px; margin-bottom:6px; }
.card p { font-size:13px; color:var(--muted); margin-bottom:24px; }
label { display:block; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); margin-bottom:8px; }
input { width:100%; padding:14px 16px; background:var(--card2); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:'DM Sans', sans-serif; font-size:14px; outline:none; }
input:focus { border-color:var(--gold); }
.btn { width:100%; margin-top:20px; padding:16px; border:none; border-radius:12px; background:linear-gradient(135deg, var(--gold), #E8C96A); color:#0E0E14; font-family:'DM Sans', sans-serif; font-size:14px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; }
.btn:disabled { opacity:.5; }
.err { margin-top:12px; padding:10px 14px; background:rgba(231,76,60,0.12); border:1px solid rgba(231,76,60,0.3); border-radius:10px; font-size:12px; color:#E74C3C; display:none; }
.err.show { display:block; }
#dash { display:none; }
.top { padding:20px 0 16px; display:flex; justify-content:space-between; }
.name { font-family:'Playfair Display', serif; font-size:24px; font-weight:700; }
.code { display:inline-block; margin-top:4px; padding:4px 12px; border-radius:100px; background:rgba(201,168,76,0.12); border:1px solid rgba(201,168,76,0.3); font-size:11px; letter-spacing:2px; color:var(--gold); text-transform:uppercase; }
.kpi { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:16px 0; }
.kpi-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px 16px; }
.kpi-card.full { grid-column:1/-1; }
.label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.value { font-family:'Playfair Display', serif; font-size:32px; font-weight:700; }
.value.green { color:var(--green); }
.sub { font-size:11px; color:var(--muted); margin-top:4px; }
.bar { margin-top:12px; background:var(--card2); border-radius:100px; height:8px; }
.bar-fill { height:100%; border-radius:100px; background:linear-gradient(90deg, var(--gold), var(--green)); transition:width 1.2s; }
.title { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin:24px 0 12px; }
.list { display:flex; flex-direction:column; gap:8px; }
.item { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px; display:flex; gap:12px; }
.icon { width:36px; height:36px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; }
.icon.won { background:rgba(46,204,113,0.15); }
.icon.lost { background:rgba(231,76,60,0.12); }
.info { flex:1; }
.nome { font-size:13px; font-weight:600; }
.meta { font-size:11px; color:var(--muted); margin-top:2px; }
.status { font-size:10px; padding:4px 10px; border-radius:100px; flex-shrink:0; }
.status.won { background:rgba(46,204,113,0.15); color:var(--green); }
.status.lost { background:rgba(231,76,60,0.1); color:var(--red); }
.empty { text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; }
.exit { background:none; border:1px solid var(--border); color:var(--muted); border-radius:10px; padding:8px 14px; font-size:11px; cursor:pointer; }
.exit:hover { border-color:var(--gold); color:var(--gold); }
</style>
</head>
<body>

<div id="login">
  <div class="wrap" style="width:100%">
    <div class="brand">
      <div class="brand-eyebrow">Porto Seguro · BA</div>
      <div class="brand-name">Ateliê dos Olhos</div>
      <div class="brand-sub">Seu Painel de Resultados</div>
    </div>
    <div style="width:60px; height:2px; background:linear-gradient(90deg, transparent, var(--gold), transparent); margin:0 auto;"></div>
    <div class="card">
      <h2>Acessar Painel</h2>
      <p>Digite seu código de acesso</p>
      <label>Seu código</label>
      <input type="text" id="cod" placeholder="Digite seu código aqui" autocomplete="off">
      <button class="btn" onclick="login()">Acessar meu painel</button>
      <div class="err" id="err"></div>
    </div>
  </div>
</div>

<div id="dash">
  <div class="wrap">
    <div class="top">
      <div>
        <div style="font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--gold);">Olá,</div>
        <div class="name" id="n">—</div>
        <div class="code" id="c">—</div>
      </div>
      <button class="exit" onclick="logout()">Sair</button>
    </div>
    <div class="kpi">
      <div class="kpi-card">
        <div class="label">Indicações</div>
        <div class="value" id="v1">0</div>
        <div class="sub">clientes</div>
      </div>
      <div class="kpi-card">
        <div class="label">Vendas</div>
        <div class="value green" id="v2">0</div>
        <div class="sub">conversões</div>
      </div>
      <div class="kpi-card full">
        <div class="label">Taxa de conversão</div>
        <div class="value" id="v3">0%</div>
        <div class="bar"><div class="bar-fill" id="b"></div></div>
      </div>
      <div class="kpi-card full">
        <div class="label">Seu crédito</div>
        <div class="value" id="v4">R$ 0,00</div>
        <div class="sub">em comissão</div>
      </div>
    </div>
    <div class="title">Histórico</div>
    <div class="list" id="list"></div>
  </div>
</div>

<script>
const SHEET = "1So-Tr9n_wvTTbaxC-mf_CAaJmmO1yi5RLBfysXe6zDY";
const KEY = "AIzaSyCtO6Bw_kNH8g_OlrZgq7aTfTbrEftCujo";

document.getElementById("cod").addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});

async function login() {
  const cod = document.getElementById("cod").value.trim().toLowerCase();
  if (!cod) { err("Digite seu código"); return; }

  try {
    const inf = await getInf(cod);
    if (!inf) { err("Código não encontrado"); return; }
    await showDash(inf);
  } catch (e) {
    err("Erro ao carregar");
  }
}

async function getInf(cod) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET}/values/'👤 Influenciadores'?key=${KEY}`;
  const res = await fetch(url);
  if (!res.ok) return null;
  
  const data = await res.json();
  const rows = data.values || [];
  
  for (let i = 1; i < rows.length; i++) {
    if (rows[i][7] && rows[i][7].toLowerCase() === cod) {
      return {
        nome: rows[i][0] || "",
        cupom: rows[i][1] || "",
        descInf: parseFloat(rows[i][9]) || 5,
        aba: "📍 " + (rows[i][0] || "")
      };
    }
  }
  return null;
}

function logout() {
  document.getElementById("login").style.display = "flex";
  document.getElementById("dash").style.display = "none";
  document.getElementById("cod").value = "";
}

async function showDash(inf) {
  document.getElementById("login").style.display = "none";
  document.getElementById("dash").style.display = "block";
  document.getElementById("n").textContent = inf.nome;
  document.getElementById("c").textContent = inf.cupom;

  try {
    const vis = await getVis(inf.aba);
    const vend = await getVend(inf.cupom);

    const vendidas = vis.filter(v => v.status && v.status.includes("Comprou")).length;
    const total = vis.length;
    const pct = total > 0 ? Math.round(vendidas / total * 100) : 0;
    const totalDesc = vend.reduce((s, v) => s + (parseFloat(v.desconto) || 0), 0);
    const comissao = totalDesc * (inf.descInf / 100);

    document.getElementById("v1").textContent = total;
    document.getElementById("v2").textContent = vendidas;
    document.getElementById("v3").textContent = pct + "%";
    document.getElementById("v4").textContent = comissao.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

    setTimeout(() => {
      document.getElementById("b").style.width = pct + "%";
    }, 300);

    const list = document.getElementById("list");
    list.innerHTML = "";
    if (vis.length === 0) {
      list.innerHTML = `<div class="empty"><div style="font-size:32px; margin-bottom:12px; opacity:.5">🔭</div>Nenhuma indicação ainda</div>`;
      return;
    }

    [...vis].reverse().forEach(v => {
      const st = v.status.includes("Comprou") ? {l:"Comprou", c:"won", i:"✅"} : {l:"Não comprou", c:"lost", i:"❌"};
      const item = document.createElement("div");
      item.className = "item";
      item.innerHTML = `
        <div class="icon ${st.c}">${st.i}</div>
        <div class="info">
          <div class="nome">${v.cliente}</div>
          <div class="meta">${v.canal} · ${v.data}</div>
        </div>
        <div class="status ${st.c}">${st.l}</div>
      `;
      list.appendChild(item);
    });
  } catch (e) {
    document.getElementById("list").innerHTML = `<div class="empty">Erro ao carregar</div>`;
  }
}

async function getVis(sheet) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET}/values/'${sheet}'?key=${KEY}`;
  const res = await fetch(url);
  if (!res.ok) return [];
  
  const data = await res.json();
  const rows = data.values || [];
  if (rows.length < 2) return [];

  return rows.slice(1).map(r => ({
    data: r[0] || "",
    cliente: r[2] || "",
    canal: r[4] || "",
    status: r[5] || ""
  })).filter(v => v.cliente);
}

async function getVend(cupom) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET}/values/'📋 Vendas'?key=${KEY}`;
  const res = await fetch(url);
  if (!res.ok) return [];
  
  const data = await res.json();
  const rows = data.values || [];
  if (rows.length < 2) return [];

  return rows.slice(1).filter(r => r[0] === cupom).map(r => ({
    desconto: r[4] || 0
  }));
}

function err(msg) {
  const e = document.getElementById("err");
  e.textContent = msg;
  e.classList.add("show");
}
</script>
</body>
</html>
